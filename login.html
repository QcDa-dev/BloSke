<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ログイン - BloSke</title>
    <link rel="icon" href="favicon.ico" sizes="any">
    <link rel="icon" href="icon.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="apple-touch-icon.png">
    <link rel="stylesheet" href="common.css">
    <link rel="stylesheet" href="auth.css">
</head>
<body class="pt-16 pb-16 bg-gray-50 flex items-center justify-center min-h-screen">

    <div class="bg-white p-8 md:p-10 rounded-2xl shadow-xl border border-gray-100 w-full max-w-md mx-4">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-extrabold text-blue-600 mb-2">BloSke ログイン</h1>
            <p class="text-gray-500 text-sm">アカウント情報を入力してください</p>
        </div>
        
        <form id="login-form" class="space-y-5">
            <div>
                <label for="email" class="block text-sm font-semibold text-gray-700 mb-1">メールアドレス</label>
                <input type="email" id="email" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 transition-shadow" required>
            </div>
            <div>
                <label for="password" class="block text-sm font-semibold text-gray-700 mb-1">パスワード</label>
                <input type="password" id="password" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 transition-shadow" required>
            </div>
            
            <button type="submit" class="w-full py-3 bg-blue-600 hover:bg-blue-700 text-white font-bold rounded-lg shadow-md transition-colors flex justify-center items-center gap-2 mt-2">
                <i class="fa-solid fa-right-to-bracket"></i> ログイン
            </button>
            
            <div class="relative flex py-4 items-center">
                <div class="flex-grow border-t border-gray-300"></div>
                <span class="flex-shrink-0 mx-4 text-gray-400 text-sm">または</span>
                <div class="flex-grow border-t border-gray-300"></div>
            </div>
            
            <button type="button" id="google-login-btn" class="w-full py-3 bg-white hover:bg-gray-50 text-gray-700 font-semibold rounded-lg border border-gray-300 shadow-sm transition-colors flex justify-center items-center gap-3">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google icon" class="w-5 h-5">
                Googleでログイン
            </button>
        </form>
        
        <div class="mt-8 text-center space-y-3">
            <a href="register.html" class="block text-sm text-blue-600 hover:text-blue-800 font-medium hover:underline">新規登録はこちら</a>
            <a href="forgot.html" class="block text-sm text-gray-500 hover:text-gray-700 font-medium hover:underline">パスワードを忘れた方はこちら</a>
        </div>
    </div>
    
    <script type="module">
        import { initCommonUI, showLoading, hideLoading, auth, signInWithEmailAndPassword, googleProvider, signInWithPopup } from './common.js';

        document.addEventListener('DOMContentLoaded', () => {
            initCommonUI('BloSke');

            const loginForm = document.getElementById('login-form');
            const googleLoginBtn = document.getElementById('google-login-btn');

            const redirectAfterLogin = () => {
                const reason = sessionStorage.getItem('login_redirect_reason');
                if (reason === 'save') {
                    sessionStorage.removeItem('login_redirect_reason');
                    window.location.href = 'edit.html';
                } else {
                    window.location.href = 'projects.html';
                }
            };

            // メールアドレスログイン
            loginForm.addEventListener('submit', async (e) => {
                e.preventDefault();
                const email = document.getElementById('email').value;
                const password = document.getElementById('password').value;

                showLoading();
                try {
                    await signInWithEmailAndPassword(auth, email, password);
                    redirectAfterLogin();
                } catch (error) {
                    console.error('Login Error:', error);
                    alert('ログインに失敗しました。メールアドレスとパスワードを確認してください。');
                } finally {
                    hideLoading();
                }
            });

            // Googleログイン (Popup方式に統一して体験向上)
            googleLoginBtn.addEventListener('click', async () => {
                showLoading();
                try {
                    await signInWithPopup(auth, googleProvider);
                    redirectAfterLogin();
                } catch (error) {
                    console.error('Google Login Error:', error);
                    alert(`Google認証に失敗しました: ${error.message}`);
                } finally {
                    hideLoading();
                }
            });
        });
    </script>
</body>
</html>
