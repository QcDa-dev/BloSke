<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ログイン - BloSke | QcDa Project</title>
    <link rel="icon" href="favicon.ico">
    <link rel="apple-touch-icon" href="apple-touch-icon.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="common.css">
</head>
<body>
    <main class="flex items-center justify-center p-6">
        <div class="w-full max-w-md bg-white p-8 rounded-2xl shadow-sm border border-slate-100">
            <h2 class="text-2xl font-bold text-center text-slate-800 mb-8">ログイン</h2>
            
            <div id="error-msg" class="hidden bg-red-50 text-red-600 p-3 rounded-lg text-sm mb-4"></div>

            <form id="login-form">
                <label class="block text-sm font-medium text-slate-700 mb-1">メールアドレス</label>
                <input type="email" id="email" class="form-input" required>
                
                <label class="block text-sm font-medium text-slate-700 mb-1">パスワード</label>
                <input type="password" id="password" class="form-input" required>
                
                <div class="text-right mb-4">
                    <a href="#" id="forgot-password" class="text-sm text-blue-600 hover:underline">パスワードを忘れた場合</a>
                </div>

                <button type="submit" id="submit-btn" class="btn btn-primary w-full mb-4">ログイン</button>
            </form>

            <div class="relative flex py-4 items-center">
                <div class="flex-grow border-t border-slate-200"></div>
                <span class="flex-shrink-0 mx-4 text-slate-400 text-sm">または</span>
                <div class="flex-grow border-t border-slate-200"></div>
            </div>

            <button id="google-login-btn" class="btn btn-secondary w-full bg-white border border-slate-200 flex items-center justify-center gap-2 hover:bg-slate-50">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="20px" height="20px"><path fill="#FFC107" d="M43.611,20.083H42V20H24v8h11.303c-1.649,4.657-6.08,8-11.303,8c-6.627,0-12-5.373-12-12c0-6.627,5.373-12,12-12c3.059,0,5.842,1.154,7.961,3.039l5.657-5.657C34.046,6.053,29.268,4,24,4C12.955,4,4,12.955,4,24c0,11.045,8.955,20,20,20c11.045,0,20-8.955,20-20C44,22.659,43.862,21.35,43.611,20.083z"/><path fill="#FF3D00" d="M6.306,14.691l6.571,4.819C14.655,15.108,18.961,12,24,12c3.059,0,5.842,1.154,7.961,3.039l5.657-5.657C34.046,6.053,29.268,4,24,4C16.318,4,9.656,8.337,6.306,14.691z"/><path fill="#4CAF50" d="M24,44c5.166,0,9.86-1.977,13.409-5.192l-6.19-5.238C29.211,35.091,26.715,36,24,36c-5.202,0-9.619-3.317-11.283-7.946l-6.522,5.025C9.505,39.556,16.227,44,24,44z"/><path fill="#1976D2" d="M43.611,20.083H42V20H24v8h11.303c-0.792,2.237-2.231,4.166-4.087,5.571c0.001-0.001,0.002-0.001,0.003-0.002l6.19,5.238C36.971,39.205,44,34,44,24C44,22.659,43.862,21.35,43.611,20.083z"/></svg>
                Googleでログイン
            </button>
            
            <div class="mt-6 text-center text-sm">
                アカウントをお持ちでないですか？ <a href="register.html" class="text-blue-600 hover:underline">新規登録</a>
            </div>
        </div>
    </main>

    <script type="module">
        import { initCommonUI, requireNoAuth, auth } from './common.js';
        import { signInWithEmailAndPassword, signInWithPopup, GoogleAuthProvider, sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        document.addEventListener('DOMContentLoaded', () => {
            initCommonUI();
            requireNoAuth();

            const form = document.getElementById('login-form');
            const googleBtn = document.getElementById('google-login-btn');
            const errorMsg = document.getElementById('error-msg');
            const forgotBtn = document.getElementById('forgot-password');

            const showError = (msg) => {
                errorMsg.textContent = msg;
                errorMsg.classList.remove('hidden');
            };

            form.addEventListener('submit', async (e) => {
                e.preventDefault();
                const email = document.getElementById('email').value;
                const password = document.getElementById('password').value;
                try {
                    document.getElementById('submit-btn').textContent = 'ログイン中...';
                    await signInWithEmailAndPassword(auth, email, password);
                    window.location.href = 'projects.html';
                } catch (error) {
                    showError("ログインに失敗しました。メールアドレスとパスワードを確認してください。");
                    document.getElementById('submit-btn').textContent = 'ログイン';
                }
            });

            googleBtn.addEventListener('click', async () => {
                const provider = new GoogleAuthProvider();
                try {
                    await signInWithPopup(auth, provider);
                    window.location.href = 'projects.html';
                } catch (error) {
                    showError("Googleログインに失敗しました。");
                }
            });

            forgotBtn.addEventListener('click', async (e) => {
                e.preventDefault();
                const email = document.getElementById('email').value;
                if (!email) {
                    showError("パスワードをリセットするには、メールアドレスを入力してください。");
                    return;
                }
                try {
                    await sendPasswordResetEmail(auth, email);
                    alert("パスワードリセットメールを送信しました。");
                } catch (error) {
                    showError("メール送信に失敗しました。");
                }
            });
        });
    </script>
</body>
</html>
