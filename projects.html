<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>保存データ一覧 - BloSke | QcDa Project</title>
    <link rel="icon" href="favicon.ico">
    <link rel="apple-touch-icon" href="apple-touch-icon.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="common.css">
</head>
<body>
    <main class="container mx-auto p-6 max-w-4xl">
        <div class="flex justify-between items-center mb-8">
            <h1 class="text-2xl font-bold text-slate-800">プロジェクト一覧</h1>
            <button id="new-project-btn" class="btn btn-primary shadow-sm">
                + 新規作成
            </button>
        </div>

        <div id="loading" class="text-center py-12">
            <div class="loader"></div>
            <p class="mt-4 text-slate-500">データを読み込んでいます...</p>
        </div>

        <div id="projects-grid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-6 hidden">
            <!-- プロジェクトカードがここに挿入されます -->
        </div>
        
        <div id="empty-state" class="hidden text-center py-16 bg-white rounded-xl border border-dashed border-slate-300">
            <p class="text-slate-500 mb-4">保存されたプロジェクトがありません。</p>
            <button id="empty-new-btn" class="btn btn-outline">最初のプロジェクトを作成</button>
        </div>
    </main>

    <!-- プロジェクト名入力モーダル -->
    <div id="name-modal" class="modal-backdrop">
        <div class="modal-content">
            <h3 class="text-xl font-bold mb-4">新規プロジェクトの作成</h3>
            <label class="block text-sm font-medium text-slate-700 mb-1">プロジェクト名</label>
            <input type="text" id="project-name-input" class="form-input" value="My Project 1">
            <div class="flex justify-end gap-3 mt-4">
                <button id="cancel-name-btn" class="btn btn-secondary">キャンセル</button>
                <button id="confirm-name-btn" class="btn btn-primary">決定</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initCommonUI, requireAuth, auth, db } from './common.js';
        import { collection, query, where, getDocs, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        document.addEventListener('DOMContentLoaded', () => {
            initCommonUI();
            requireAuth();

            const grid = document.getElementById('projects-grid');
            const loading = document.getElementById('loading');
            const emptyState = document.getElementById('empty-state');
            const modal = document.getElementById('name-modal');
            const projectNameInput = document.getElementById('project-name-input');

            // 新規作成処理
            const showModal = () => {
                modal.classList.add('show');
                projectNameInput.focus();
                // localStorageをクリアして新規作成状態にする
                localStorage.removeItem('bloske_local_project');
            };
            const hideModal = () => modal.classList.remove('show');

            document.getElementById('new-project-btn').addEventListener('click', showModal);
            document.getElementById('empty-new-btn').addEventListener('click', showModal);
            document.getElementById('cancel-name-btn').addEventListener('click', hideModal);
            
            document.getElementById('confirm-name-btn').addEventListener('click', () => {
                const name = projectNameInput.value.trim() || 'Untitled Project';
                // URLにパラメータとしてプロジェクト名を持たせ、ID指定なしでeditへ
                window.location.href = `edit.html?name=${encodeURIComponent(name)}`;
            });

            // データ取得
            onAuthStateChanged(auth, async (user) => {
                if (!user) return;

                try {
                    const q = query(
                        collection(db, "projects"), 
                        where("userId", "==", user.uid)
                    );
                    const querySnapshot = await getDocs(q);
                    
                    loading.classList.add('hidden');

                    if (querySnapshot.empty) {
                        emptyState.classList.remove('hidden');
                    } else {
                        grid.classList.remove('hidden');
                        
                        // クライアント側でソート (Firestoreのインデックス作成回避のため)
                        const projects = [];
                        querySnapshot.forEach((doc) => {
                            projects.push({ id: doc.id, ...doc.data() });
                        });
                        projects.sort((a, b) => (b.updatedAt?.toMillis() || 0) - (a.updatedAt?.toMillis() || 0));

                        projects.forEach((proj) => {
                            const dateStr = proj.updatedAt ? new Date(proj.updatedAt.toDate()).toLocaleDateString('ja-JP') : '新規';
                            const card = document.createElement('a');
                            card.href = `edit.html?id=${proj.id}`;
                            card.className = "block bg-white p-6 rounded-xl border border-slate-200 shadow-sm hover:shadow-md transition-shadow cursor-pointer";
                            card.innerHTML = `
                                <div class="flex items-center gap-3 mb-3 text-blue-500">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/></svg>
                                    <h3 class="font-bold text-lg text-slate-800 truncate">${proj.projectName}</h3>
                                </div>
                                <p class="text-sm text-slate-500 flex items-center justify-between">
                                    <span>ブロック数: ${proj.blocks ? proj.blocks.length : 0}</span>
                                    <span>更新: ${dateStr}</span>
                                </p>
                            `;
                            grid.appendChild(card);
                        });
                    }
                } catch (error) {
                    console.error("Error fetching projects:", error);
                    loading.innerHTML = `<p class="text-red-500">データの取得に失敗しました。</p>`;
                }
            });
        });
    </script>
</body>
</html>
