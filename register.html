<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>新規登録 - BloSke | QcDa Project</title>
    <link rel="icon" href="favicon.ico">
    <link rel="apple-touch-icon" href="apple-touch-icon.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="common.css">
</head>
<body>
    <main class="flex items-center justify-center p-6">
        <div class="w-full max-w-md bg-white p-8 rounded-2xl shadow-sm border border-slate-100">
            <h2 class="text-2xl font-bold text-center text-slate-800 mb-8">アカウント登録</h2>
            
            <div id="error-msg" class="hidden bg-red-50 text-red-600 p-3 rounded-lg text-sm mb-4"></div>

            <form id="register-form">
                <label class="block text-sm font-medium text-slate-700 mb-1">メールアドレス</label>
                <input type="email" id="email" class="form-input" required>
                
                <label class="block text-sm font-medium text-slate-700 mb-1">パスワード (6文字以上)</label>
                <input type="password" id="password" class="form-input" minlength="6" required>

                <button type="submit" id="submit-btn" class="btn btn-primary w-full mb-4">登録して始める</button>
            </form>

            <div class="relative flex py-4 items-center">
                <div class="flex-grow border-t border-slate-200"></div>
                <span class="flex-shrink-0 mx-4 text-slate-400 text-sm">または</span>
                <div class="flex-grow border-t border-slate-200"></div>
            </div>

            <button id="google-reg-btn" class="btn btn-secondary w-full bg-white border border-slate-200 flex items-center justify-center gap-2 hover:bg-slate-50">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="20px" height="20px"><path fill="#FFC107" d="M43.611,20.083H42V20H24v8h11.303c-1.649,4.657-6.08,8-11.303,8c-6.627,0-12-5.373-12-12c0-6.627,5.373-12,12-12c3.059,0,5.842,1.154,7.961,3.039l5.657-5.657C34.046,6.053,29.268,4,24,4C12.955,4,4,12.955,4,24c0,11.045,8.955,20,20,20c11.045,0,20-8.955,20-20C44,22.659,43.862,21.35,43.611,20.083z"/><path fill="#FF3D00" d="M6.306,14.691l6.571,4.819C14.655,15.108,18.961,12,24,12c3.059,0,5.842,1.154,7.961,3.039l5.657-5.657C34.046,6.053,29.268,4,24,4C16.318,4,9.656,8.337,6.306,14.691z"/><path fill="#4CAF50" d="M24,44c5.166,0,9.86-1.977,13.409-5.192l-6.19-5.238C29.211,35.091,26.715,36,24,36c-5.202,0-9.619-3.317-11.283-7.946l-6.522,5.025C9.505,39.556,16.227,44,24,44z"/><path fill="#1976D2" d="M43.611,20.083H42V20H24v8h11.303c-0.792,2.237-2.231,4.166-4.087,5.571c0.001-0.001,0.002-0.001,0.003-0.002l6.19,5.238C36.971,39.205,44,34,44,24C44,22.659,43.862,21.35,43.611,20.083z"/></svg>
                Googleで登録
            </button>
            
            <div class="mt-6 text-center text-sm">
                すでにアカウントをお持ちですか？ <a href="login.html" class="text-blue-600 hover:underline">ログイン</a>
            </div>
        </div>
    </main>

    <script type="module">
        import { initCommonUI, requireNoAuth, auth, db } from './common.js';
        import { createUserWithEmailAndPassword, signInWithPopup, GoogleAuthProvider } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { doc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        document.addEventListener('DOMContentLoaded', () => {
            initCommonUI();
            requireNoAuth();

            const form = document.getElementById('register-form');
            const googleBtn = document.getElementById('google-reg-btn');
            const errorMsg = document.getElementById('error-msg');

            const showError = (msg) => {
                errorMsg.textContent = msg;
                errorMsg.classList.remove('hidden');
            };

            const saveUserMeta = async (user) => {
                await setDoc(doc(db, "users", user.uid), {
                    email: user.email,
                    createdAt: serverTimestamp()
                }, { merge: true });
            };

            form.addEventListener('submit', async (e) => {
                e.preventDefault();
                const email = document.getElementById('email').value;
                const password = document.getElementById('password').value;
                try {
                    document.getElementById('submit-btn').textContent = '処理中...';
                    const userCredential = await createUserWithEmailAndPassword(auth, email, password);
                    await saveUserMeta(userCredential.user);
                    window.location.href = 'projects.html';
                } catch (error) {
                    showError("登録に失敗しました。既に登録されている可能性があります。");
                    document.getElementById('submit-btn').textContent = '登録して始める';
                }
            });

            googleBtn.addEventListener('click', async () => {
                const provider = new GoogleAuthProvider();
                try {
                    const userCredential = await signInWithPopup(auth, provider);
                    await saveUserMeta(userCredential.user);
                    window.location.href = 'projects.html';
                } catch (error) {
                    showError("Googleでの登録に失敗しました。");
                }
            });
        });
    </script>
</body>
</html>
