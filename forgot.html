<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>パスワード再設定 - BloSke</title>
    <link rel="icon" href="favicon.ico" sizes="any">
    <link rel="icon" href="icon.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="apple-touch-icon.png">
    <link rel="stylesheet" href="common.css">
</head>
<body class="pt-16 pb-16 bg-gray-50 flex items-center justify-center min-h-screen">
    
    <div class="bg-white p-8 md:p-10 rounded-2xl shadow-xl border border-gray-100 w-full max-w-md mx-4">
        <div class="text-center mb-6">
            <h1 class="text-2xl font-extrabold text-blue-600 mb-2">パスワード再設定</h1>
            <p class="text-gray-600 text-sm leading-relaxed">
                登録済みのメールアドレスを入力してください。<br>パスワード再設定用のメールを送信します。
            </p>
        </div>

        <form id="forgot-form" class="space-y-5">
            <div>
                <label for="email" class="block text-sm font-semibold text-gray-700 mb-1">メールアドレス</label>
                <input type="email" id="email" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 transition-shadow" required>
            </div>
            
            <button type="submit" class="w-full py-3 bg-blue-600 hover:bg-blue-700 text-white font-bold rounded-lg shadow-md transition-colors flex justify-center items-center gap-2 mt-4">
                <i class="fa-solid fa-paper-plane"></i> リセットメールを送信
            </button>
        </form>
        
        <div class="mt-8 text-center">
            <a href="login.html" class="text-sm text-gray-500 hover:text-gray-700 font-medium hover:underline"><i class="fa-solid fa-arrow-left"></i> ログイン画面に戻る</a>
        </div>
    </div>
    
    <script type="module">
        import { initCommonUI, showLoading, hideLoading, auth, sendPasswordResetEmail } from './common.js';

        document.addEventListener('DOMContentLoaded', () => {
            initCommonUI('BloSke');

            const forgotForm = document.getElementById('forgot-form');

            forgotForm.addEventListener('submit', async (e) => {
                e.preventDefault();
                const email = document.getElementById('email').value.trim();

                showLoading();
                try {
                    await sendPasswordResetEmail(auth, email);
                    alert('再設定用のメールを送信しました。メールボックスを確認してください。');
                    window.location.href = 'login.html';
                } catch (error) {
                    console.error('Password Reset Error:', error);
                    let msg = 'メールの送信に失敗しました。';
                    if (error.code === 'auth/user-not-found') msg = 'このメールアドレスは登録されていません。';
                    alert(msg);
                } finally {
                    hideLoading();
                }
            });
        });
    </script>
</body>
</html>
