<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BloSke - タイムテーブル作成アプリ</title>
    <link rel="icon" href="favicon.ico" sizes="any">
    <link rel="icon" href="icon.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="apple-touch-icon.png">
    <link rel="stylesheet" href="common.css">
</head>
<body class="pt-16 pb-16 bg-gray-50 flex flex-col min-h-screen">

    <main class="flex-grow flex flex-col items-center justify-center p-6 text-center">
        <div class="max-w-2xl bg-white p-10 rounded-2xl shadow-xl border border-gray-100">
            <h1 class="text-4xl md:text-5xl font-extrabold text-blue-600 mb-6 tracking-tight">BloSkeへようこそ</h1>
            <p class="text-lg text-gray-600 mb-10 leading-relaxed">
                直感的な操作で、イベント、会議、個人の学習計画など、<br class="hidden md:block">
                あらゆるタイムテーブルを簡単に作成・共有できます。
            </p>
            
            <div class="flex flex-col md:flex-row items-center justify-center gap-4 w-full">
                <button id="new-project-btn" class="w-full md:w-auto px-8 py-4 bg-blue-600 hover:bg-blue-700 text-white text-lg font-bold rounded-xl shadow-md transition-transform transform hover:-translate-y-1 flex items-center justify-center gap-2">
                    <i class="fa-solid fa-plus"></i> 新規作成
                </button>
                <button id="load-project-btn" class="w-full md:w-auto px-8 py-4 bg-white hover:bg-gray-50 text-gray-800 text-lg font-bold rounded-xl shadow-md border border-gray-200 transition-transform transform hover:-translate-y-1 flex items-center justify-center gap-2">
                    <i class="fa-solid fa-folder-open text-blue-500"></i> 保存済みプロジェクト
                </button>
            </div>
        </div>
    </main>

    <!-- 新規作成モーダル -->
    <div id="new-project-modal" class="fixed inset-0 bg-black bg-opacity-50 z-50 hidden flex justify-center items-center p-4 backdrop-blur-sm transition-opacity">
        <div class="bg-white rounded-2xl shadow-2xl w-full max-w-md p-8 transform transition-all scale-95 opacity-0" id="new-project-modal-content">
            <h2 class="text-2xl font-bold text-gray-800 mb-6 border-b pb-3">新規プロジェクト作成</h2>
            <form id="new-project-form">
                <div class="mb-6">
                    <label for="project-name-input" class="block text-gray-700 text-sm font-bold mb-2">プロジェクト名</label>
                    <input type="text" id="project-name-input" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-shadow" required>
                </div>
                <div class="flex justify-end gap-3">
                    <button type="button" id="cancel-new-project-btn" class="px-5 py-2.5 bg-gray-100 hover:bg-gray-200 text-gray-700 font-semibold rounded-lg transition-colors">キャンセル</button>
                    <button type="submit" class="px-5 py-2.5 bg-blue-600 hover:bg-blue-700 text-white font-bold rounded-lg shadow-md transition-colors">決定</button>
                </div>
            </form>
        </div>
    </div>

    <script type="module">
        import { initCommonUI } from './common.js';

        document.addEventListener('DOMContentLoaded', () => {
            initCommonUI('BloSke');

            const modal = document.getElementById('new-project-modal');
            const modalContent = document.getElementById('new-project-modal-content');
            const cancelBtn = document.getElementById('cancel-new-project-btn');
            const newBtn = document.getElementById('new-project-btn');
            const loadBtn = document.getElementById('load-project-btn');
            const form = document.getElementById('new-project-form');
            const input = document.getElementById('project-name-input');

            const openModal = () => {
                input.value = 'my project'; // 仕様変更: 数字を付けない
                modal.classList.remove('hidden');
                setTimeout(() => {
                    modalContent.classList.remove('scale-95', 'opacity-0');
                    modalContent.classList.add('scale-100', 'opacity-100');
                    input.focus();
                }, 10);
            };

            const closeModal = () => {
                modalContent.classList.remove('scale-100', 'opacity-100');
                modalContent.classList.add('scale-95', 'opacity-0');
                setTimeout(() => {
                    modal.classList.add('hidden');
                }, 200);
            };

            newBtn.addEventListener('click', openModal);
            cancelBtn.addEventListener('click', closeModal);
            modal.addEventListener('click', (e) => {
                if (e.target === modal) closeModal();
            });

            loadBtn.addEventListener('click', () => {
                window.location.href = 'projects.html';
            });

            form.addEventListener('submit', (e) => {
                e.preventDefault();
                const projectName = input.value.trim();
                if (projectName) {
                    sessionStorage.setItem('bloske_current_project_name', projectName);
                    // 既存のセッションデータをクリア（新規のため）
                    sessionStorage.removeItem('bloske_project_id'); 
                    window.location.href = 'edit.html';
                }
            });
        });
    </script>
</body>
</html>
