<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BloSke（ブロスケ）- タイムテーブル作成アプリ | QcDa Project</title>
    <meta name="description" content="BloSke（ブロスケ）は、イベント、会議、個人の予定など、あらゆるタイムテーブルを直感的に作成できるWebアプリです。">
    <meta name="keywords" content="BloSke, ブロスケ, タイムテーブル, スケジュール, 作成, 簡単, アプリ, QcDa Project">
    <meta property="og:title" content="BloSke（ブロスケ）- タイムテーブル作成アプリ">
    <meta property="og:description" content="イベント、会議、個人の予定など、あらゆるタイムテーブルを直感的に作成できるWebアプリです。">
    <meta property="og:type" content="website">
    
    <link rel="icon" href="favicon.ico">
    <link rel="apple-touch-icon" href="apple-touch-icon.png">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="common.css">
</head>
<body>
    <main class="flex flex-col items-center justify-center p-6 text-center mt-10">
        <div class="max-w-2xl bg-white p-8 md:p-12 rounded-2xl shadow-sm border border-slate-100">
            <div class="flex justify-center mb-6 text-blue-600">
                <!-- SVG Icon Logo -->
                <svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-calendar-days"><path d="M8 2v4"/><path d="M16 2v4"/><rect width="18" height="18" x="3" y="4" rx="2"/><path d="M3 10h18"/><path d="M8 14h.01"/><path d="M12 14h.01"/><path d="M16 14h.01"/><path d="M8 18h.01"/><path d="M12 18h.01"/><path d="M16 18h.01"/></svg>
            </div>
            
            <h1 class="text-4xl md:text-5xl font-bold text-slate-800 mb-4 tracking-tight">BloSke</h1>
            <p class="text-lg text-slate-600 mb-8 leading-relaxed">
                イベント、会議、旅行の計画まで。<br>
                あらゆるタイムテーブルを、直感的な操作で簡単に作成できるアプリケーションです。
            </p>

            <div class="flex flex-col sm:flex-row justify-center gap-4 w-full">
                <a href="login.html" class="btn btn-primary w-full sm:w-auto text-lg px-8">ログインしてはじめる</a>
                <a href="register.html" class="btn btn-outline w-full sm:w-auto text-lg px-8">新規登録</a>
            </div>
            
            <div class="mt-8 pt-8 border-t border-slate-100">
                <p class="text-sm text-slate-500 mb-4">保存せずにまずは機能を試してみたい方はこちら</p>
                <a href="edit.html" class="btn btn-secondary text-sm">ログインせずに試す</a>
            </div>
        </div>
    </main>

    <script type="module">
        import { initCommonUI, auth } from './common.js';
        import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        document.addEventListener('DOMContentLoaded', () => {
            initCommonUI();
            
            // ログイン済みなら直接editかprojectsに飛べるようにlocalStorageのチェックを入れる
            onAuthStateChanged(auth, (user) => {
                if (user) {
                    const localData = localStorage.getItem('bloske_local_project');
                    if (localData) {
                        window.location.href = 'edit.html'; // 編集中データがあればエディタへ
                    } else {
                        // オプション: projects.html へ誘導など
                    }
                }
            });
        });
    </script>
</body>
</html>
