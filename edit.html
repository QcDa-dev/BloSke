<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>編集画面 - BloSke</title>
    <link rel="icon" href="favicon.ico" sizes="any">
    <link rel="icon" href="icon.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="apple-touch-icon.png">
    <link rel="stylesheet" href="common.css">
</head>
<body class="pt-16 pb-16 bg-gray-100 flex flex-col h-screen overflow-hidden">
    <!-- PC向け2カラムレイアウト: 左サイドバー + 右キャンバス -->
    <main class="flex-grow flex flex-col md:flex-row w-full h-full overflow-hidden">
        
        <!-- 左サイドバー (操作パネル) -->
        <aside class="w-full md:w-80 lg:w-96 bg-white border-r border-gray-200 flex flex-col h-1/3 md:h-full flex-shrink-0 z-10 shadow-md">
            <!-- プロジェクトヘッダー -->
            <div class="p-5 border-b border-gray-100 bg-gray-50">
                <input type="text" id="project-title-input" value="my project" class="w-full text-2xl font-extrabold text-gray-800 bg-transparent border-b-2 border-transparent hover:border-gray-300 focus:border-blue-500 focus:outline-none focus:bg-white transition-colors px-2 py-1 truncate" title="クリックして編集">
            </div>

            <!-- 操作ボタン -->
            <div class="p-4 grid grid-cols-2 gap-3 border-b border-gray-100">
                <button id="add-block-btn" class="col-span-2 py-2.5 bg-blue-600 hover:bg-blue-700 text-white font-bold rounded-lg shadow-sm transition-colors flex items-center justify-center gap-2">
                    <i class="fa-solid fa-plus"></i> ブロック追加
                </button>
                <button id="save-btn" class="py-2 bg-green-500 hover:bg-green-600 text-white font-semibold rounded-lg shadow-sm transition-colors flex items-center justify-center gap-2">
                    <i class="fa-solid fa-save"></i> 保存
                </button>
                <button id="export-img-btn" class="py-2 bg-gray-800 hover:bg-gray-900 text-white font-semibold rounded-lg shadow-sm transition-colors flex items-center justify-center gap-2">
                    <i class="fa-solid fa-image"></i> 画像出力
                </button>
            </div>

            <!-- ブロックリスト (PCで見やすい一覧) -->
            <div class="flex-grow overflow-y-auto p-4 bg-gray-50">
                <div class="flex justify-between items-center mb-3">
                    <h3 class="font-bold text-gray-700 text-sm">登録ブロック一覧</h3>
                    <button id="reset-btn" class="text-xs text-red-500 hover:text-red-700 font-semibold"><i class="fa-solid fa-trash-can"></i> 全てクリア</button>
                </div>
                <div id="block-list-container" class="space-y-2 pb-10">
                    <!-- リストアイテムがJSで挿入される -->
                </div>
            </div>
        </aside>

        <!-- 右メイン領域 (Canvas) -->
        <section class="flex-grow relative bg-gray-200 flex flex-col h-2/3 md:h-full overflow-hidden">
            <div id="canvas-wrapper" class="w-full h-full overflow-auto relative cursor-grab active:cursor-grabbing bg-white">
                <canvas id="timetableCanvas" class="block bg-white shadow-sm"></canvas>
            </div>
            
            <!-- キャンバス用ズーム等コントロール (オーバーレイ) -->
            <div class="absolute bottom-4 right-6 flex gap-2">
                 <button id="fit-width-btn" class="p-2.5 bg-white text-gray-700 rounded-lg shadow-md border border-gray-200 hover:bg-gray-50" title="幅を合わせる">
                    <i class="fa-solid fa-expand"></i>
                </button>
            </div>
        </section>
    </main>

    <!-- ブロック編集モーダル -->
    <div id="block-edit-modal" class="fixed inset-0 bg-black bg-opacity-50 z-50 hidden flex justify-center items-center p-4 backdrop-blur-sm transition-opacity opacity-0">
        <div class="bg-white rounded-2xl shadow-2xl w-full max-w-lg p-6 md:p-8 transform transition-all scale-95" id="block-edit-modal-content">
            <div class="flex justify-between items-center border-b pb-4 mb-5">
                <h2 id="block-modal-title" class="text-xl font-bold text-gray-800">ブロック情報</h2>
                <button id="close-modal-icon" class="text-gray-400 hover:text-red-500"><i class="fa-solid fa-xmark fa-lg"></i></button>
            </div>
            
            <form id="block-edit-form" class="space-y-4">
                <input type="hidden" id="block-id"> 
                
                <div>
                    <label for="block-name" class="block text-sm font-semibold text-gray-700 mb-1">ブロック名 <span class="text-red-500">*</span></label>
                    <input type="text" id="block-name" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none" required>
                </div>
                
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-1">開始日時 <span class="text-red-500">*</span></label>
                        <div class="flex flex-col xl:flex-row gap-2">
                            <input type="date" id="block-start-date" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none" required>
                            <input type="time" id="block-start-time" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none" required>
                        </div>
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-1">終了日時 <span class="text-red-500">*</span></label>
                        <div class="flex flex-col xl:flex-row gap-2">
                            <input type="date" id="block-end-date" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none" required>
                            <input type="time" id="block-end-time" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none" required>
                        </div>
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-2">テーマカラー</label>
                    <div id="color-picker" class="flex flex-wrap gap-3 p-2 bg-gray-50 rounded-lg border border-gray-100">
                        <!-- JSで動的に生成 -->
                    </div>
                    <input type="hidden" id="block-color" value="#3B82F6">
                </div>

                <div class="flex justify-end gap-3 pt-4 border-t mt-6">
                    <button type="button" id="delete-block-btn" class="hidden px-4 py-2 bg-red-50 text-red-600 hover:bg-red-100 font-semibold rounded-lg transition-colors mr-auto border border-red-200"><i class="fa-solid fa-trash-can"></i> 削除</button>
                    <button type="button" id="cancel-block-edit-btn" class="px-5 py-2 bg-gray-100 hover:bg-gray-200 text-gray-700 font-semibold rounded-lg transition-colors">キャンセル</button>
                    <button type="submit" class="px-6 py-2 bg-blue-600 hover:bg-blue-700 text-white font-bold rounded-lg shadow-sm transition-colors">決定</button>
                </div>
            </form>
        </div>
    </div>

    <script type="module">
        import { initCommonUI, auth, db, doc, setDoc, getDoc, APP_ID, showLoading, hideLoading } from './common.js';

        document.addEventListener('DOMContentLoaded', async () => {
            initCommonUI('BloSke');

            // --- 状態管理 ---
            let projectBlocks = [];
            let projectId = null; // Firestore上のドキュメントID
            const userId = auth.currentUser ? auth.currentUser.uid : null;

            // DOM Elements
            const titleInput = document.getElementById('project-title-input');
            const wrapper = document.getElementById('canvas-wrapper');
            const canvas = document.getElementById('timetableCanvas');
            const ctx = canvas.getContext('2d');
            const blockListContainer = document.getElementById('block-list-container');
            
            // モーダル
            const modal = document.getElementById('block-edit-modal');
            const modalContent = document.getElementById('block-edit-modal-content');
            const form = document.getElementById('block-edit-form');
            const colorPicker = document.getElementById('color-picker');
            const blockColorInput = document.getElementById('block-color');
            const deleteBlockBtn = document.getElementById('delete-block-btn');

            // Canvas描画設定 (ガントチャート風)
            const ROW_HEIGHT = 60;
            const PADDING_TOP = 60; // 時間軸表示エリア
            const PADDING_X = 40;
            const PIXELS_PER_MINUTE = 2; // 1分あたりのピクセル数 (ズームで可変にする場合はここを調整)
            
            let minTimeMs = 0;
            let maxTimeMs = 0;
            let layoutRowCount = 1;

            let isDraggingBlock = false;
            let dragTarget = null;
            let dragStartX = 0;
            let dragStartY = 0;
            let originalStartMs = 0;
            let originalEndMs = 0;
            let originalRow = 0;
            
            let isPanning = false;
            let panStartX = 0;
            let panStartY = 0;
            let scrollLeftStart = 0;
            let scrollTopStart = 0;

            let animationFrameId = null;

            // --- 初期化ロジック ---
            const urlParams = new URLSearchParams(window.location.search);
            projectId = urlParams.get('id');

            if (projectId && userId) {
                // 既存プロジェクトのロード
                showLoading();
                try {
                    const docRef = doc(db, 'artifacts', APP_ID, 'users', userId, 'projects', projectId);
                    const docSnap = await getDoc(docRef);
                    if (docSnap.exists()) {
                        const data = docSnap.data();
                        titleInput.value = data.name || '無題のプロジェクト';
                        projectBlocks = data.blocks || [];
                    } else {
                        alert("指定されたプロジェクトは見つかりませんでした。新規作成として開始します。");
                        projectId = null;
                    }
                } catch (e) {
                    console.error("Load Error:", e);
                    alert("データの読み込みに失敗しました。");
                } finally {
                    hideLoading();
                }
            } else {
                // 新規プロジェクト
                const sessionName = sessionStorage.getItem('bloske_current_project_name');
                if (sessionName) {
                    titleInput.value = sessionName;
                }
            }

            // --- カラーパレット設定 ---
            const colors = ['#3B82F6', '#EF4444', '#10B981', '#F59E0B', '#8B5CF6', '#F472B6', '#14B8A6', '#64748B'];
            colors.forEach(color => {
                const circle = document.createElement('div');
                circle.className = 'w-8 h-8 rounded-full cursor-pointer border-2 transition-transform hover:scale-110';
                circle.style.backgroundColor = color;
                circle.style.borderColor = color === blockColorInput.value ? '#1e293b' : 'transparent';
                circle.dataset.color = color;
                
                circle.addEventListener('click', () => {
                    blockColorInput.value = color;
                    Array.from(colorPicker.children).forEach(c => c.style.borderColor = 'transparent');
                    circle.style.borderColor = '#1e293b';
                });
                colorPicker.appendChild(circle);
            });

            // --- Canvas 描画ロジック ---
            function updateBoundsAndRows() {
                if (projectBlocks.length === 0) {
                    const now = new Date();
                    now.setMinutes(0,0,0);
                    minTimeMs = now.getTime();
                    maxTimeMs = minTimeMs + (4 * 60 * 60 * 1000); // デフォルト4時間
                    layoutRowCount = 1;
                    return;
                }
                
                let minStart = Infinity;
                let maxEnd = -Infinity;
                projectBlocks.forEach(b => {
                    const s = new Date(b.startISO).getTime();
                    const e = new Date(b.endISO).getTime();
                    if (s < minStart) minStart = s;
                    if (e > maxEnd) maxEnd = e;
                });

                // 前後30分程度の余白を持たせる
                minTimeMs = minStart - (30 * 60 * 1000);
                maxTimeMs = maxEnd + (30 * 60 * 1000);

                // Rowの計算 (愚直に被りをチェックして割り当て)
                // ソートして配置
                const sorted = [...projectBlocks].sort((a,b) => new Date(a.startISO) - new Date(b.startISO));
                let maxRow = 0;
                sorted.forEach(target => {
                    if (target === dragTarget && isDraggingBlock) return; // ドラッグ中は元のRowを保持または動的に計算
                    
                    let row = 0;
                    const tStart = new Date(target.startISO).getTime();
                    const tEnd = new Date(target.endISO).getTime();
                    
                    while (true) {
                        const conflict = sorted.some(other => {
                            if (other === target) return false;
                            if (other.layoutRow !== row) return false;
                            if (other === dragTarget && isDraggingBlock) return false; // ドラッグ中のは無視
                            const oStart = new Date(other.startISO).getTime();
                            const oEnd = new Date(other.endISO).getTime();
                            // 少しだけマージンをもたせる判定
                            return (tStart < oEnd) && (tEnd > oStart); 
                        });
                        if (!conflict) break;
                        row++;
                    }
                    target.layoutRow = row;
                    if (row > maxRow) maxRow = row;
                });
                
                // ドラッグ中の要素の行判定 (Y座標ベース)
                if (isDraggingBlock && dragTarget) {
                    let r = Math.floor((dragStartY - PADDING_TOP) / ROW_HEIGHT);
                    if (r < 0) r = 0;
                    dragTarget.layoutRow = r;
                    if (r > maxRow) maxRow = r;
                }

                layoutRowCount = maxRow + 2; // 下に1行余白
            }

            function requestRender() {
                if (!animationFrameId) {
                    animationFrameId = requestAnimationFrame(renderCanvas);
                }
            }

            function formatTime(ms) {
                const d = new Date(ms);
                const h = String(d.getHours()).padStart(2, '0');
                const m = String(d.getMinutes()).padStart(2, '0');
                return `${h}:${m}`;
            }

            function renderCanvas() {
                animationFrameId = null;
                updateBoundsAndRows();

                const totalMinutes = (maxTimeMs - minTimeMs) / 60000;
                const canvasW = Math.max(wrapper.clientWidth, (totalMinutes * PIXELS_PER_MINUTE) + (PADDING_X * 2));
                const canvasH = Math.max(wrapper.clientHeight, PADDING_TOP + (layoutRowCount * ROW_HEIGHT) + 40);

                // デバイスピクセル比に対応してくっきり描画
                const dpr = window.devicePixelRatio || 1;
                canvas.width = canvasW * dpr;
                canvas.height = canvasH * dpr;
                canvas.style.width = `${canvasW}px`;
                canvas.style.height = `${canvasH}px`;
                ctx.scale(dpr, dpr);

                // 背景
                ctx.fillStyle = '#ffffff';
                ctx.fillRect(0, 0, canvasW, canvasH);

                // 時間軸の描画 (30分刻み)
                ctx.beginPath();
                ctx.strokeStyle = '#e2e8f0'; // slate-200
                ctx.lineWidth = 1;
                ctx.fillStyle = '#64748b'; // slate-500
                ctx.font = '12px Inter, sans-serif';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';

                const startMinuteRounded = Math.floor(minTimeMs / (30*60*1000)) * (30*60*1000);
                for (let t = startMinuteRounded; t <= maxTimeMs; t += 30 * 60 * 1000) {
                    const x = PADDING_X + ((t - minTimeMs) / 60000) * PIXELS_PER_MINUTE;
                    if (x < PADDING_X || x > canvasW - PADDING_X) continue;

                    // 縦線
                    ctx.moveTo(x, PADDING_TOP - 10);
                    ctx.lineTo(x, canvasH);
                    
                    // テキスト
                    const isHour = new Date(t).getMinutes() === 0;
                    if (isHour) {
                        ctx.fillStyle = '#334155'; // 濃く
                        ctx.font = 'bold 13px Inter, sans-serif';
                    } else {
                        ctx.fillStyle = '#94a3b8'; // 薄く
                        ctx.font = '11px Inter, sans-serif';
                    }
                    ctx.fillText(formatTime(t), x, PADDING_TOP - 20);
                }
                ctx.stroke();

                // ブロック描画領域のベースライン
                ctx.beginPath();
                ctx.strokeStyle = '#cbd5e1';
                ctx.moveTo(0, PADDING_TOP);
                ctx.lineTo(canvasW, PADDING_TOP);
                ctx.stroke();

                // 行のガイドライン
                ctx.beginPath();
                ctx.strokeStyle = '#f1f5f9';
                for (let i = 1; i <= layoutRowCount; i++) {
                    ctx.moveTo(0, PADDING_TOP + i * ROW_HEIGHT);
                    ctx.lineTo(canvasW, PADDING_TOP + i * ROW_HEIGHT);
                }
                ctx.stroke();

                // ブロックの描画
                projectBlocks.forEach(block => {
                    const isDrag = (block === dragTarget && isDraggingBlock);
                    
                    const startMs = new Date(block.startISO).getTime();
                    const endMs = new Date(block.endISO).getTime();
                    
                    let drawStartMs = startMs;
                    let drawEndMs = endMs;
                    let row = block.layoutRow;

                    if (isDrag) {
                        // ドラッグ中の位置をピクセルから逆算
                        const deltaMs = ((dragStartX - PADDING_X) / PIXELS_PER_MINUTE * 60000) - originalStartMs;
                        // 実際にはマウス位置から時間を計算する
                        const currentMouseMs = minTimeMs + ((dragStartX - PADDING_X) / PIXELS_PER_MINUTE * 60000);
                        const offsetMs = currentMouseMs - originalStartMs; //掴んだ位置のオフセットはマウスダウン時に計算しておくべき。
                        // ここはシンプルに:
                        // マウスのX座標を「ブロックの左端の時間」とする（掴んだオフセット考慮）
                    }

                    // 描画座標計算
                    let x = PADDING_X + ((startMs - minTimeMs) / 60000) * PIXELS_PER_MINUTE;
                    let w = ((endMs - startMs) / 60000) * PIXELS_PER_MINUTE;
                    let y = PADDING_TOP + (row * ROW_HEIGHT) + 10;
                    let h = ROW_HEIGHT - 20;

                    if (isDrag) {
                        // ドラッグ中はマウス座標ベースで直接描画位置を上書き
                        x = dragStartX;
                        y = dragStartY;
                        // 透明度を下げる
                        ctx.globalAlpha = 0.6;
                        // 時間表示も更新
                    } else {
                        ctx.globalAlpha = 1.0;
                    }

                    // ヒットボックス保存 (ドラッグ中以外)
                    if (!isDrag) {
                        block.hitBox = { x, y, w, h };
                    }

                    // 角丸矩形
                    ctx.fillStyle = block.color || '#3B82F6';
                    ctx.beginPath();
                    ctx.roundRect(x, y, Math.max(w, 10), h, 6); // API support needs fallback if old browser, but standard now
                    ctx.fill();

                    // テキスト
                    ctx.fillStyle = '#ffffff';
                    ctx.save();
                    ctx.beginPath();
                    ctx.rect(x, y, w, h);
                    ctx.clip(); // はみ出し防止

                    ctx.font = 'bold 14px "Noto Sans JP", sans-serif';
                    ctx.textAlign = 'left';
                    ctx.textBaseline = 'top';
                    ctx.fillText(block.name, x + 8, y + 6);

                    // 時間
                    ctx.font = '11px Inter, sans-serif';
                    const timeStr = `${formatTime(startMs)} - ${formatTime(endMs)}`;
                    ctx.fillText(timeStr, x + 8, y + 24);

                    ctx.restore();
                    ctx.globalAlpha = 1.0;
                });
                
                updateSidebarList();
            }

            // Canvas Polyfill for roundRect
            if (!CanvasRenderingContext2D.prototype.roundRect) {
                CanvasRenderingContext2D.prototype.roundRect = function (x, y, w, h, r) {
                    if (w < 2 * r) r = w / 2;
                    if (h < 2 * r) r = h / 2;
                    this.moveTo(x + r, y);
                    this.arcTo(x + w, y, x + w, y + h, r);
                    this.arcTo(x + w, y + h, x, y + h, r);
                    this.arcTo(x, y + h, x, y, r);
                    this.arcTo(x, y, x + w, y, r);
                    this.closePath();
                    return this;
                };
            }

            // --- サイドバーリストの更新 ---
            function updateSidebarList() {
                blockListContainer.innerHTML = '';
                if (projectBlocks.length === 0) {
                    blockListContainer.innerHTML = '<p class="text-xs text-gray-400 text-center py-4">ブロックがありません</p>';
                    return;
                }
                const sorted = [...projectBlocks].sort((a,b) => new Date(a.startISO) - new Date(b.startISO));
                sorted.forEach(block => {
                    const item = document.createElement('div');
                    item.className = 'bg-white p-3 rounded border border-gray-200 shadow-sm flex items-center justify-between group cursor-pointer hover:border-blue-400 transition-colors';
                    item.innerHTML = `
                        <div class="flex items-center gap-2 overflow-hidden">
                            <div class="w-3 h-3 rounded-full flex-shrink-0" style="background-color: ${block.color || '#3B82F6'}"></div>
                            <div class="truncate">
                                <div class="text-sm font-bold text-gray-800 truncate">${escapeHTML(block.name)}</div>
                                <div class="text-xs text-gray-500">${formatTime(new Date(block.startISO).getTime())} - ${formatTime(new Date(block.endISO).getTime())}</div>
                            </div>
                        </div>
                        <button class="text-gray-300 hover:text-blue-500 opacity-0 group-hover:opacity-100 transition-opacity p-1 edit-list-btn" title="編集">
                            <i class="fa-solid fa-pen"></i>
                        </button>
                    `;
                    // リストクリックで編集モーダル
                    item.addEventListener('click', () => openModal(block));
                    blockListContainer.appendChild(item);
                });
            }

            function escapeHTML(str) { return str.replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[m]); }


            // --- インタラクション (マウス・タッチ) ---
            let dragOffsetX = 0;
            let dragOffsetY = 0;

            function getMousePos(e) {
                const rect = canvas.getBoundingClientRect();
                const clientX = e.clientX || (e.touches && e.touches[0].clientX);
                const clientY = e.clientY || (e.touches && e.touches[0].clientY);
                return {
                    x: clientX - rect.left,
                    y: clientY - rect.top
                };
            }

            canvas.addEventListener('mousedown', handleDown);
            canvas.addEventListener('mousemove', handleMove);
            canvas.addEventListener('mouseup', handleUp);
            canvas.addEventListener('mouseleave', handleUp);
            canvas.addEventListener('touchstart', handleDown, {passive: false});
            canvas.addEventListener('touchmove', handleMove, {passive: false});
            canvas.addEventListener('touchend', handleUp);

            function handleDown(e) {
                const pos = getMousePos(e);
                
                // ブロックヒットテスト (逆順で上にあるものを優先)
                for (let i = projectBlocks.length - 1; i >= 0; i--) {
                    const b = projectBlocks[i];
                    if (b.hitBox) {
                        if (pos.x >= b.hitBox.x && pos.x <= b.hitBox.x + b.hitBox.w &&
                            pos.y >= b.hitBox.y && pos.y <= b.hitBox.y + b.hitBox.h) {
                            
                            isDraggingBlock = true;
                            dragTarget = b;
                            dragOffsetX = pos.x - b.hitBox.x;
                            dragOffsetY = pos.y - b.hitBox.y;
                            
                            dragStartX = b.hitBox.x;
                            dragStartY = b.hitBox.y;
                            originalStartMs = new Date(b.startISO).getTime();
                            originalEndMs = new Date(b.endISO).getTime();
                            
                            canvas.classList.add('dragging');
                            if(e.type==='touchstart') e.preventDefault();
                            return;
                        }
                    }
                }

                // ブロックに当たらなければパン (スクロール) 処理へ
                isPanning = true;
                panStartX = e.clientX || (e.touches && e.touches[0].clientX);
                panStartY = e.clientY || (e.touches && e.touches[0].clientY);
                scrollLeftStart = wrapper.scrollLeft;
                scrollTopStart = wrapper.scrollTop;
            }

            function handleMove(e) {
                if (isDraggingBlock && dragTarget) {
                    if(e.type==='touchmove') e.preventDefault();
                    const pos = getMousePos(e);
                    
                    dragStartX = pos.x - dragOffsetX;
                    dragStartY = pos.y - dragOffsetY;
                    
                    // 時間の逆算 (スナップ: 5分単位)
                    const msPerPixel = 60000 / PIXELS_PER_MINUTE;
                    let newStartMs = minTimeMs + ((dragStartX - PADDING_X) * msPerPixel);
                    
                    // 5分(300000ms)単位にスナップ
                    const snapMs = 5 * 60000;
                    newStartMs = Math.round(newStartMs / snapMs) * snapMs;
                    
                    const duration = originalEndMs - originalStartMs;
                    
                    dragTarget.startISO = new Date(newStartMs).toISOString();
                    dragTarget.endISO = new Date(newStartMs + duration).toISOString();
                    
                    requestRender();
                } else if (isPanning) {
                    const clientX = e.clientX || (e.touches && e.touches[0].clientX);
                    const clientY = e.clientY || (e.touches && e.touches[0].clientY);
                    const dx = clientX - panStartX;
                    const dy = clientY - panStartY;
                    wrapper.scrollLeft = scrollLeftStart - dx;
                    wrapper.scrollTop = scrollTopStart - dy;
                }
            }

            function handleUp(e) {
                if (isDraggingBlock) {
                    isDraggingBlock = false;
                    dragTarget = null;
                    canvas.classList.remove('dragging');
                    requestRender(); // 最終位置で確定描画
                }
                isPanning = false;
            }

            // クリック（長押し判定なしの単純なクリックで編集）は、今回は左サイドバーのリストから行えるのでCanvasからの編集は必須ではないが、利便性のため残す。
            canvas.addEventListener('click', (e) => {
                if (isDraggingBlock || isPanning) return; // 動かした後は無視したいが、ここでは簡易的に。
                // 実際には downとupの距離が小さい時にクリックとするのが定石
            });


            // --- モーダル・フォーム操作 ---
            const openModal = (block = null) => {
                form.reset();
                deleteBlockBtn.classList.add('hidden');
                document.getElementById('block-modal-title').textContent = block ? 'ブロック編集' : 'ブロック追加';
                
                if (block) {
                    document.getElementById('block-id').value = block.id;
                    document.getElementById('block-name').value = block.name;
                    const s = new Date(block.startISO);
                    const e = new Date(block.endISO);
                    // yyyy-MM-dd format (ローカルタイムで合わせる)
                    const sDate = s.toLocaleDateString('ja-JP').split('/').map(n=>n.padStart(2,'0')).join('-');
                    const eDate = e.toLocaleDateString('ja-JP').split('/').map(n=>n.padStart(2,'0')).join('-');
                    document.getElementById('block-start-date').value = sDate;
                    document.getElementById('block-start-time').value = String(s.getHours()).padStart(2,'0') + ':' + String(s.getMinutes()).padStart(2,'0');
                    document.getElementById('block-end-date').value = eDate;
                    document.getElementById('block-end-time').value = String(e.getHours()).padStart(2,'0') + ':' + String(e.getMinutes()).padStart(2,'0');
                    blockColorInput.value = block.color || '#3B82F6';
                    deleteBlockBtn.classList.remove('hidden');
                } else {
                    document.getElementById('block-id').value = '';
                    const now = new Date();
                    const sDate = now.toLocaleDateString('ja-JP').split('/').map(n=>n.padStart(2,'0')).join('-');
                    const t = String(now.getHours()).padStart(2,'0') + ':00';
                    document.getElementById('block-start-date').value = sDate;
                    document.getElementById('block-start-time').value = t;
                    document.getElementById('block-end-date').value = sDate;
                    document.getElementById('block-end-time').value = String(now.getHours()+1).padStart(2,'0') + ':00';
                    blockColorInput.value = '#3B82F6';
                }

                Array.from(colorPicker.children).forEach(c => {
                    c.style.borderColor = c.dataset.color === blockColorInput.value ? '#1e293b' : 'transparent';
                });

                modal.classList.remove('hidden');
                setTimeout(() => {
                    modalContent.classList.remove('scale-95', 'opacity-0');
                    modalContent.classList.add('scale-100', 'opacity-100');
                    document.getElementById('block-name').focus();
                }, 10);
            };

            const closeModal = () => {
                modalContent.classList.remove('scale-100', 'opacity-100');
                modalContent.classList.add('scale-95', 'opacity-0');
                setTimeout(() => { modal.classList.add('hidden'); }, 200);
            };

            document.getElementById('add-block-btn').addEventListener('click', () => openModal());
            document.getElementById('cancel-block-edit-btn').addEventListener('click', closeModal);
            document.getElementById('close-modal-icon').addEventListener('click', closeModal);

            form.addEventListener('submit', (e) => {
                e.preventDefault();
                const id = document.getElementById('block-id').value;
                const name = document.getElementById('block-name').value;
                const sd = document.getElementById('block-start-date').value;
                const st = document.getElementById('block-start-time').value;
                const ed = document.getElementById('block-end-date').value;
                const et = document.getElementById('block-end-time').value;
                const color = document.getElementById('block-color').value;

                // ISO文字列化
                const startISO = new Date(`${sd}T${st}`).toISOString();
                const endISO = new Date(`${ed}T${et}`).toISOString();

                if (new Date(endISO) <= new Date(startISO)) {
                    alert('終了日時は開始日時より後に設定してください。');
                    return;
                }

                if (id) {
                    const idx = projectBlocks.findIndex(b => b.id === id);
                    if (idx > -1) {
                        projectBlocks[idx] = { ...projectBlocks[idx], name, startISO, endISO, color };
                    }
                } else {
                    projectBlocks.push({
                        id: crypto.randomUUID(),
                        name, startISO, endISO, color, layoutRow: -1
                    });
                }
                
                closeModal();
                requestRender();
            });

            deleteBlockBtn.addEventListener('click', () => {
                const id = document.getElementById('block-id').value;
                if (id && confirm('このブロックを削除しますか？')) {
                    projectBlocks = projectBlocks.filter(b => b.id !== id);
                    closeModal();
                    requestRender();
                }
            });

            document.getElementById('reset-btn').addEventListener('click', () => {
                if(confirm('すべてのブロックを削除しますか？')){
                    projectBlocks = [];
                    requestRender();
                }
            });

            // --- Firestore 保存 ---
            document.getElementById('save-btn').addEventListener('click', async () => {
                if (!auth.currentUser) {
                    alert('保存するにはログインが必要です。');
                    sessionStorage.setItem('login_redirect_reason', 'save');
                    window.location.href = 'login.html';
                    return;
                }
                
                const title = titleInput.value.trim() || '無題のプロジェクト';
                showLoading();
                try {
                    const pId = projectId || crypto.randomUUID();
                    const docRef = doc(db, 'artifacts', APP_ID, 'users', auth.currentUser.uid, 'projects', pId);
                    
                    await setDoc(docRef, {
                        name: title,
                        blocks: projectBlocks,
                        updatedAt: Date.now()
                    });
                    
                    if (!projectId) {
                        projectId = pId; // 新規保存時にIDをセット
                        // URLを更新しておくとリロード時に復帰できる (history API)
                        const url = new URL(window.location);
                        url.searchParams.set('id', projectId);
                        window.history.pushState({}, '', url);
                    }
                    alert('保存しました！');
                } catch (e) {
                    console.error("Save Error:", e);
                    alert("保存に失敗しました。");
                } finally {
                    hideLoading();
                }
            });

            // --- 画像出力 ---
            document.getElementById('export-img-btn').addEventListener('click', () => {
                if (projectBlocks.length === 0) {
                    alert('出力するブロックがありません。');
                    return;
                }
                try {
                    // 背景を確実に白にしてから出力
                    const dataUrl = canvas.toDataURL('image/png');
                    const link = document.createElement('a');
                    link.download = `${titleInput.value.trim()}_timetable.png`;
                    link.href = dataUrl;
                    link.click();
                } catch (e) {
                    console.error('Export Error:', e);
                    alert('画像の出力に失敗しました。');
                }
            });

            // 初期描画
            window.addEventListener('resize', requestRender);
            requestRender();
        });
    </script>
</body>
</html>
