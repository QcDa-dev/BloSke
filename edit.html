<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>タイムテーブル編集 - BloSke | QcDa Project</title>
    <link rel="icon" href="favicon.ico">
    <link rel="apple-touch-icon" href="apple-touch-icon.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="common.css">
    <style>
        #canvas-container {
            width: 100%;
            overflow-x: auto; /* 横スクロール対応 */
            background-color: white;
            border: 1px solid #e2e8f0;
            border-radius: 0.5rem;
            touch-action: none; /* スマホでのデフォルトスクロール無効化（Canvas操作のため） */
        }
        canvas {
            display: block;
            min-width: 800px; /* 最小幅を確保 */
        }
    </style>
</head>
<body class="bg-slate-50">
    <main class="flex flex-col h-[calc(100vh-4rem-3.5rem)]"> <!-- ヘッダーとフッター分を引く -->
        
        <!-- ツールバー -->
        <div class="bg-white border-b border-slate-200 p-4 flex flex-wrap items-center justify-between gap-4">
            <div class="flex items-center gap-2 flex-grow">
                <input type="text" id="project-title" class="text-xl font-bold text-slate-800 border-none bg-transparent hover:bg-slate-100 px-2 py-1 rounded focus:outline-none focus:ring-2 focus:ring-blue-500 w-full max-w-sm" value="無題のプロジェクト">
            </div>
            
            <div class="flex flex-wrap items-center gap-2">
                <button id="btn-add" class="btn btn-primary py-1.5 px-3 text-sm flex gap-1">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                    ブロック追加
                </button>
                <button id="btn-edit-mode" class="btn btn-secondary py-1.5 px-3 text-sm flex gap-1">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"></path></svg>
                    編集モード
                </button>
                <button id="btn-save" class="btn btn-outline py-1.5 px-3 text-sm flex gap-1 bg-white">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path><polyline points="17 21 17 13 7 13 7 21"></polyline><polyline points="7 3 7 8 15 8"></polyline></svg>
                    保存
                </button>
                <button id="btn-download" class="btn btn-secondary py-1.5 px-3 text-sm" title="画像出力">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
                </button>
                <button id="btn-reset" class="btn btn-danger py-1.5 px-3 text-sm" title="リセット">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
                </button>
            </div>
        </div>

        <!-- ワークスペース -->
        <div class="flex-grow p-4 overflow-hidden flex flex-col">
            <div id="save-status" class="text-xs text-slate-400 mb-2 text-right h-4"></div>
            <div id="canvas-container" class="flex-grow relative shadow-sm">
                <canvas id="timetable-canvas"></canvas>
            </div>
        </div>
    </main>

    <!-- ブロック編集モーダル -->
    <div id="block-modal" class="modal-backdrop">
        <div class="modal-content">
            <h3 id="block-modal-title" class="text-xl font-bold mb-4">ブロックの追加</h3>
            <form id="block-form">
                <input type="hidden" id="block-id">
                
                <label class="block text-sm font-medium text-slate-700 mb-1">ブロック名</label>
                <input type="text" id="block-title" class="form-input" required>
                
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">開始日時</label>
                        <input type="datetime-local" id="block-start" class="form-input" required>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">終了日時</label>
                        <input type="datetime-local" id="block-end" class="form-input" required>
                    </div>
                </div>
                
                <label class="block text-sm font-medium text-slate-700 mb-1">カラー</label>
                <div class="flex gap-2 mb-4">
                    <!-- デフォルトパレット -->
                    <label class="cursor-pointer"><input type="radio" name="bColor" value="#3B82F6" class="hidden peer" checked><div class="w-8 h-8 rounded-full bg-blue-500 ring-offset-2 peer-checked:ring-2 ring-blue-500"></div></label>
                    <label class="cursor-pointer"><input type="radio" name="bColor" value="#10B981" class="hidden peer"><div class="w-8 h-8 rounded-full bg-emerald-500 ring-offset-2 peer-checked:ring-2 ring-emerald-500"></div></label>
                    <label class="cursor-pointer"><input type="radio" name="bColor" value="#F59E0B" class="hidden peer"><div class="w-8 h-8 rounded-full bg-amber-500 ring-offset-2 peer-checked:ring-2 ring-amber-500"></div></label>
                    <label class="cursor-pointer"><input type="radio" name="bColor" value="#EF4444" class="hidden peer"><div class="w-8 h-8 rounded-full bg-red-500 ring-offset-2 peer-checked:ring-2 ring-red-500"></div></label>
                    <label class="cursor-pointer"><input type="radio" name="bColor" value="#8B5CF6" class="hidden peer"><div class="w-8 h-8 rounded-full bg-violet-500 ring-offset-2 peer-checked:ring-2 ring-violet-500"></div></label>
                    <label class="cursor-pointer"><input type="radio" name="bColor" value="#64748B" class="hidden peer"><div class="w-8 h-8 rounded-full bg-slate-500 ring-offset-2 peer-checked:ring-2 ring-slate-500"></div></label>
                </div>

                <div class="flex justify-end gap-3 mt-6 border-t border-slate-100 pt-4">
                    <button type="button" id="btn-modal-cancel" class="btn btn-secondary">キャンセル</button>
                    <button type="submit" class="btn btn-primary">決定</button>
                </div>
            </form>
        </div>
    </div>

    <script type="module">
        import { initCommonUI, auth, db, getQueryParam } from './common.js';
        import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { doc, getDoc, setDoc, updateDoc, serverTimestamp, collection } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        document.addEventListener('DOMContentLoaded', () => {
            initCommonUI();

            // --- State ---
        let projectState = {
            id: getQueryParam('id') || null,
            projectName: getQueryParam('name') || "無題のプロジェクト",
            blocks: []
        };
        let currentUser = null;
        let isEditMode = false;
        
        // --- Canvas Interaction State ---
        let isDragging = false;
        let draggedBlock = null;
        let dragOffsetX = 0;
        let dragOffsetY = 0;
        let blockRenderData = []; // 描画時の座標データ { block, x, y, w, h }
        let currentMinTime = 0;
        let cachedMinTime = 0; // ドラッグ中の時間軸固定用
        let cachedMaxTime = 0; // ドラッグ中の時間軸固定用

        // --- UI Elements ---
            const titleInput = document.getElementById('project-title');
            const statusDiv = document.getElementById('save-status');
            const canvas = document.getElementById('timetable-canvas');
            const ctx = canvas.getContext('2d');
            const container = document.getElementById('canvas-container');
            const modal = document.getElementById('block-modal');
            const form = document.getElementById('block-form');

            titleInput.value = projectState.projectName;

            // --- Canvas Settings ---
            const CONFIG = {
                rowHeight: 60,
                timelineHeight: 50,
                pixelsPerMinute: 2, // 1分あたりのピクセル幅
                paddingX: 60,
                paddingY: 20
            };

            // --- Helper: Local Storage ---
            const saveLocal = () => {
                projectState.projectName = titleInput.value;
                localStorage.setItem('bloske_local_project', JSON.stringify(projectState));
                statusDiv.textContent = 'ローカルに自動保存しました ' + new Date().toLocaleTimeString();
                drawCanvas();
            };

            const assignRowsIfNeeded = () => {
                let modified = false;
                const rowEnds = [];
                
                projectState.blocks.forEach(b => {
                    if (b.row !== undefined) {
                        const et = new Date(b.endTime).getTime();
                        if (rowEnds[b.row] === undefined || rowEnds[b.row] < et) {
                            rowEnds[b.row] = et;
                        }
                    }
                });

                const unassigned = projectState.blocks.filter(b => b.row === undefined).sort((a, b) => new Date(a.startTime) - new Date(b.startTime));
                unassigned.forEach(b => {
                    const st = new Date(b.startTime).getTime();
                    const et = new Date(b.endTime).getTime();
                    let rowIndex = -1;
                    
                    for (let i = 0; i < rowEnds.length; i++) {
                        if (rowEnds[i] === undefined || rowEnds[i] <= st) {
                            rowIndex = i;
                            break;
                        }
                    }
                    if (rowIndex === -1) {
                        rowIndex = rowEnds.length;
                    }
                    b.row = rowIndex;
                    rowEnds[rowIndex] = et;
                    modified = true;
                });
                
                if (modified) saveLocal();
            };

            const loadLocal = () => {
                const data = localStorage.getItem('bloske_local_project');
                if (data) {
                    const parsed = JSON.parse(data);
                    // Firestoreからロードする場合と競合しないようIDがない場合のみ
                    if (!projectState.id || parsed.id === projectState.id) {
                        projectState = parsed;
                        titleInput.value = projectState.projectName;
                        assignRowsIfNeeded();
                    }
                }
            };

            // --- Firebase Load/Save ---
            onAuthStateChanged(auth, async (user) => {
                currentUser = user;
                if (projectState.id && user) {
                    try {
                        const docRef = doc(db, "projects", projectState.id);
                        const docSnap = await getDoc(docRef);
                        if (docSnap.exists() && docSnap.data().userId === user.uid) {
                            projectState = { id: docSnap.id, ...docSnap.data() };
                            titleInput.value = projectState.projectName;
                            assignRowsIfNeeded();
                            drawCanvas();
                        } else {
                            alert("データが見つからないか、アクセス権がありません。");
                            window.location.href = 'projects.html';
                        }
                    } catch (e) {
                        console.error(e);
                    }
                } else if (!projectState.id) {
                    loadLocal(); // 新規の場合はローカル復元試行
                    drawCanvas();
                } else {
                    // ID付きURLだが未ログイン
                    alert("データを読み込むにはログインが必要です。");
                    window.location.href = 'login.html';
                }
            });

            document.getElementById('btn-save').addEventListener('click', async () => {
                if (!currentUser) {
                    saveLocal();
                    alert("サーバーに保存するにはログインが必要です。ログイン画面へ移動します。");
                    window.location.href = 'login.html';
                    return;
                }

                statusDiv.textContent = '保存中...';
                projectState.projectName = titleInput.value;

                try {
                    const dataToSave = {
                        userId: currentUser.uid,
                        projectName: projectState.projectName,
                        blocks: projectState.blocks,
                        updatedAt: serverTimestamp()
                    };

                    if (projectState.id) {
                        await updateDoc(doc(db, "projects", projectState.id), dataToSave);
                    } else {
                        dataToSave.createdAt = serverTimestamp();
                        const newDocRef = doc(collection(db, "projects"));
                        await setDoc(newDocRef, dataToSave);
                        projectState.id = newDocRef.id;
                        // URL更新
                        window.history.replaceState(null, '', `edit.html?id=${projectState.id}`);
                    }
                    statusDiv.textContent = 'クラウドに保存しました ' + new Date().toLocaleTimeString();
                    localStorage.removeItem('bloske_local_project'); // クラウド保存成功でローカルクリア
                } catch (e) {
                    console.error("Save error:", e);
                    statusDiv.textContent = '保存エラー';
                    alert("保存に失敗しました。権限を確認してください。");
                }
            });

            titleInput.addEventListener('change', saveLocal);

            // --- Canvas Drawing Logic ---
            const resizeCanvas = () => {
                // コンテナの幅に合わせて、最低限必要な幅を計算
                let minTime = Infinity;
                let maxTime = -Infinity;
                
                projectState.blocks.forEach(b => {
                    const t1 = new Date(b.startTime).getTime();
                    const t2 = new Date(b.endTime).getTime();
                    if(t1 < minTime) minTime = t1;
                    if(t2 > maxTime) maxTime = t2;
                });

                let canvasWidth = container.clientWidth;
                let maxRow = 0;

                if (minTime !== Infinity && maxTime !== -Infinity) {
                    // 余白（前後30分）
                    minTime -= 30 * 60 * 1000;
                    maxTime += 30 * 60 * 1000;
                    
                    // キリのいい時間（30分ごと）に切り捨て/切り上げ
                    let drawMinTime = new Date(minTime);
                    drawMinTime.setMinutes(drawMinTime.getMinutes() < 30 ? 0 : 30, 0, 0);
                    minTime = drawMinTime.getTime();

                    let drawMaxTime = new Date(maxTime);
                    drawMaxTime.setMinutes(drawMaxTime.getMinutes() <= 30 ? 30 : 60, 0, 0);
                    maxTime = drawMaxTime.getTime();

                    // リサイズ時にもキャッシュを更新しておく
                    cachedMinTime = minTime;
                    cachedMaxTime = maxTime;

                    const durationMins = (maxTime - minTime) / (1000 * 60);
                    const requiredWidth = durationMins * CONFIG.pixelsPerMinute + (CONFIG.paddingX * 2);
                    if (requiredWidth > canvasWidth) canvasWidth = requiredWidth;

                    // 行数の計算（高さ調整用：ユーザーが指定したrowの最大値を取得）
                    if (projectState.blocks.length > 0) {
                        maxRow = Math.max(...projectState.blocks.map(b => b.row || 0)) + 1;
                    }
                }

                // スケジュール内容に合わせてCanvasの高さを拡張
                let requiredHeight = CONFIG.timelineHeight + CONFIG.paddingY + maxRow * (CONFIG.rowHeight + 10) + 80;
                let canvasHeight = container.clientHeight - 10;
                if (requiredHeight > canvasHeight) canvasHeight = requiredHeight;

                canvas.width = canvasWidth;
                canvas.height = canvasHeight;
                drawCanvas();
            };
            window.addEventListener('resize', resizeCanvas);

            const drawCanvas = () => {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                blockRenderData = []; // 描画ごとの判定データをリセット
                
                if (!projectState.blocks || projectState.blocks.length === 0) {
                    ctx.fillStyle = '#94A3B8';
                    ctx.font = '16px Inter';
                    ctx.textAlign = 'center';
                    ctx.fillText('イベントが1つも登録されていません。', canvas.width / 2, canvas.height / 2);
                    return;
                }

                let minTime, maxTime;

                // ドラッグ中（操作中）は時間軸のスケールを固定してズレを防ぐ
                if (!isDragging || cachedMinTime === 0) {
                    minTime = Infinity;
                    maxTime = -Infinity;
                    projectState.blocks.forEach(b => {
                        const t1 = new Date(b.startTime).getTime();
                        const t2 = new Date(b.endTime).getTime();
                        if(t1 < minTime) minTime = t1;
                        if(t2 > maxTime) maxTime = t2;
                    });

                    // 余白（前後30分）
                    minTime -= 30 * 60 * 1000;
                    maxTime += 30 * 60 * 1000;
                    
                    // 30分単位でキリの良い時刻に切り下げ/切り上げ
                    let drawMinTime = new Date(minTime);
                    drawMinTime.setMinutes(drawMinTime.getMinutes() < 30 ? 0 : 30, 0, 0);
                    minTime = drawMinTime.getTime();

                    let drawMaxTime = new Date(maxTime);
                    drawMaxTime.setMinutes(drawMaxTime.getMinutes() <= 30 ? 30 : 60, 0, 0);
                    maxTime = drawMaxTime.getTime();

                    cachedMinTime = minTime;
                    cachedMaxTime = maxTime;
                } else {
                    minTime = cachedMinTime;
                    maxTime = cachedMaxTime;
                }

                currentMinTime = minTime; // ドラッグ計算用に保持

                // --- 時間軸と背景グリッドの描画 ---
                ctx.beginPath();
                ctx.moveTo(CONFIG.paddingX, CONFIG.timelineHeight);
                ctx.lineTo(canvas.width - CONFIG.paddingX, CONFIG.timelineHeight);
                ctx.strokeStyle = '#CBD5E1';
                ctx.lineWidth = 2;
                ctx.stroke();

                // 30分刻みの縦線と時刻
                const totalMinutes = (maxTime - minTime) / (1000 * 60);
                for (let m = 0; m <= totalMinutes; m += 30) {
                    const x = CONFIG.paddingX + m * CONFIG.pixelsPerMinute;
                    
                    // 縦線
                    ctx.beginPath();
                    ctx.moveTo(x, CONFIG.timelineHeight);
                    ctx.lineTo(x, canvas.height - 20); // 下部余白まで
                    ctx.strokeStyle = m % 60 === 0 ? '#E2E8F0' : '#F8FAFC'; // 1時間は少し濃く、30分は薄く
                    ctx.lineWidth = 1;
                    if (m % 60 !== 0) {
                        ctx.setLineDash([4, 4]); // 30分の線は破線
                    } else {
                        ctx.setLineDash([]);
                    }
                    ctx.stroke();
                    ctx.setLineDash([]); // 元に戻す

                    // 時刻テキスト
                    const t = new Date(minTime + m * 60 * 1000);
                    const timeStr = t.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                    ctx.fillStyle = '#64748B';
                    ctx.font = '12px Inter';
                    ctx.textAlign = 'center';
                    ctx.fillText(timeStr, x, CONFIG.timelineHeight - 10);
                }

                // --- 両端の日付表示 ---
                const startDateStr = new Date(minTime).toLocaleDateString('ja-JP', { month: 'short', day: 'numeric' });
                const endDateStr = new Date(maxTime).toLocaleDateString('ja-JP', { month: 'short', day: 'numeric' });
                ctx.fillStyle = '#334155';
                ctx.font = 'bold 14px Inter';
                ctx.textAlign = 'left';
                ctx.fillText(startDateStr, 10, 20);
                ctx.textAlign = 'right';
                ctx.fillText(endDateStr, canvas.width - 10, 20);

                // --- ブロックの描画 ---
                projectState.blocks.forEach(b => {
                    const st = new Date(b.startTime).getTime();
                    const et = new Date(b.endTime).getTime();
                    
                    const startX = CONFIG.paddingX + ((st - minTime) / (1000 * 60)) * CONFIG.pixelsPerMinute;
                    const endX = CONFIG.paddingX + ((et - minTime) / (1000 * 60)) * CONFIG.pixelsPerMinute;
                    const width = endX - startX;
                    
                    const row = b.row || 0;
                    const y = CONFIG.timelineHeight + CONFIG.paddingY + (row * (CONFIG.rowHeight + 10));

                    // 当たり判定用データを記録
                    blockRenderData.push({ block: b, x: startX, y: y, w: width, h: CONFIG.rowHeight });

                    // 矩形
                    ctx.fillStyle = b.color || '#3B82F6';
                    ctx.globalAlpha = (b === draggedBlock) ? 0.5 : 0.8; // ドラッグ中は半透明にして分かりやすく
                    ctx.beginPath();
                    ctx.roundRect(startX, y, width, CONFIG.rowHeight, 6);
                    ctx.fill();
                    ctx.globalAlpha = 1.0;

                    // テキスト
                    ctx.fillStyle = '#FFFFFF';
                    ctx.font = 'bold 12px Inter';
                    ctx.textAlign = 'left';
                    ctx.fillText(b.title, startX + 5, y + 20);

                    const stStr = new Date(st).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
                    const etStr = new Date(et).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
                    ctx.font = '10px Inter';
                    ctx.fillText(`${stStr} - ${etStr}`, startX + 5, y + 40);

                    // 編集モードUI (削除ボタン)
                    if (isEditMode) {
                        ctx.fillStyle = 'rgba(255,255,255,0.9)';
                        ctx.beginPath();
                        ctx.arc(endX - 10, y + 10, 8, 0, Math.PI*2);
                        ctx.fill();
                        ctx.fillStyle = '#EF4444';
                        ctx.font = 'bold 10px Inter';
                        ctx.textAlign = 'center';
                        ctx.fillText('X', endX - 10, y + 13);
                    }
                });
            };

            // --- Canvas Interaction (Mouse & Touch) ---
            const getPointerPos = (e) => {
                const rect = canvas.getBoundingClientRect();
                const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                const clientY = e.touches ? e.touches[0].clientY : e.clientY;
                return {
                    x: clientX - rect.left,
                    y: clientY - rect.top
                };
            };

            const handlePointerDown = (e) => {
                const pos = getPointerPos(e);
                
                // 描画が後（前面）のブロックから判定する
                for (let i = blockRenderData.length - 1; i >= 0; i--) {
                    const { block, x, y, w, h } = blockRenderData[i];
                    
                    if (isEditMode) {
                        // 削除ボタンの判定
                        const btnX = x + w - 10;
                        const btnY = y + 10;
                        const dist = Math.sqrt(Math.pow(pos.x - btnX, 2) + Math.pow(pos.y - btnY, 2));
                        if (dist <= 12) { 
                            if (confirm(`「${block.title}」を削除しますか？`)) {
                                projectState.blocks = projectState.blocks.filter(b => b.id !== block.id);
                                saveLocal();
                                resizeCanvas();
                            }
                            return; 
                        }
                    }

                    // ブロック本体のクリック判定
                    if (pos.x >= x && pos.x <= x + w && pos.y >= y && pos.y <= y + h) {
                        if (isEditMode) {
                            // 編集モードなら編集モーダルを開く
                            openEditModal(block);
                            return;
                        } else {
                            // 通常モードならドラッグ開始
                            isDragging = true;
                            draggedBlock = block;
                            dragOffsetX = pos.x - x;
                            dragOffsetY = pos.y - y;
                            if (e.touches) e.preventDefault(); // スマホのスクロール防止
                            return;
                        }
                    }
                }
            };

            const handlePointerMove = (e) => {
                if (!isDragging || !draggedBlock) return;
                if (e.touches) e.preventDefault(); // ドラッグ中のスクロール防止

                const pos = getPointerPos(e);
                const newStartX = pos.x - dragOffsetX;
                const newY = pos.y - dragOffsetY;
                
                // X座標から新しい開始時間を計算し、5分単位にスナップ
                let offsetMins = (newStartX - CONFIG.paddingX) / CONFIG.pixelsPerMinute;
                offsetMins = Math.round(offsetMins / 5) * 5; // 5分の倍数に丸める
                
                const newStartTime = new Date(currentMinTime + offsetMins * 60 * 1000);
                
                // ブロックの長さ（Duration）を維持して終了時間を計算
                const duration = new Date(draggedBlock.endTime).getTime() - new Date(draggedBlock.startTime).getTime();
                const newEndTime = new Date(newStartTime.getTime() + duration);

                // 分単位にスナップさせるため秒以下をリセット
                newStartTime.setSeconds(0, 0);
                newEndTime.setSeconds(0, 0);
                
                draggedBlock.startTime = newStartTime.toISOString();
                draggedBlock.endTime = newEndTime.toISOString();

                // Y座標から新しい行(row)を計算して更新
                let newRow = Math.round((newY - (CONFIG.timelineHeight + CONFIG.paddingY)) / (CONFIG.rowHeight + 10));
                draggedBlock.row = Math.max(0, newRow);

                // 描画更新
                drawCanvas();
            };

            const handlePointerUp = (e) => {
                if (isDragging) {
                    isDragging = false;
                    draggedBlock = null;
                    saveLocal(); // ドロップ完了時に保存
                    resizeCanvas(); // 配置が変わってCanvas幅が変わる可能性があるため
                }
            };

            // イベントリスナーの登録
            canvas.addEventListener('mousedown', handlePointerDown);
            canvas.addEventListener('mousemove', handlePointerMove);
            window.addEventListener('mouseup', handlePointerUp);

            canvas.addEventListener('touchstart', handlePointerDown, { passive: false });
            canvas.addEventListener('touchmove', handlePointerMove, { passive: false });
            window.addEventListener('touchend', handlePointerUp);

            // --- Interaction ---
            document.getElementById('btn-edit-mode').addEventListener('click', (e) => {
                isEditMode = !isEditMode;
                e.currentTarget.classList.toggle('btn-primary');
                e.currentTarget.classList.toggle('btn-secondary');
                drawCanvas();
            });

            document.getElementById('btn-add').addEventListener('click', () => {
                openEditModal();
            });

            // モーダルを開く処理を共通化
            const openEditModal = (block = null) => {
                form.reset();
                if (block) {
                    // 編集時のデータ流し込み
                    document.getElementById('block-id').value = block.id;
                    document.getElementById('block-title').value = block.title;
                    
                    // JSTなどのローカルタイムゾーンを考慮してdatetime-local用の文字列を生成
                    const toLocalInputFormat = (isoString) => {
                        const date = new Date(isoString);
                        date.setMinutes(date.getMinutes() - date.getTimezoneOffset());
                        return date.toISOString().slice(0, 16);
                    };

                    document.getElementById('block-start').value = toLocalInputFormat(block.startTime);
                    document.getElementById('block-end').value = toLocalInputFormat(block.endTime);
                    
                    const colorInput = document.querySelector(`input[name="bColor"][value="${block.color}"]`);
                    if (colorInput) colorInput.checked = true;
                    
                    document.getElementById('block-modal-title').textContent = 'ブロックの編集';
                } else {
                    // 新規追加時の初期値
                    document.getElementById('block-id').value = '';
                    document.getElementById('block-modal-title').textContent = 'ブロックの追加';
                    const now = new Date();
                    now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
                    document.getElementById('block-start').value = now.toISOString().slice(0,16);
                    now.setHours(now.getHours() + 1);
                    document.getElementById('block-end').value = now.toISOString().slice(0,16);
                }
                modal.classList.add('show');
            };

            document.getElementById('btn-modal-cancel').addEventListener('click', () => {
                modal.classList.remove('show');
            });

            form.addEventListener('submit', (e) => {
                e.preventDefault();
                const id = document.getElementById('block-id').value || crypto.randomUUID();
                const title = document.getElementById('block-title').value;
                const startTime = document.getElementById('block-start').value;
                const endTime = document.getElementById('block-end').value;
                const color = document.querySelector('input[name="bColor"]:checked').value;

                if (new Date(startTime) >= new Date(endTime)) {
                    alert('終了日時は開始日時より後に設定してください。');
                    return;
                }

                const newBlock = { id, title, startTime, endTime, color };

                const existingIdx = projectState.blocks.findIndex(b => b.id === id);
                if (existingIdx >= 0) {
                    newBlock.row = projectState.blocks[existingIdx].row; // 既存の行を維持
                    projectState.blocks[existingIdx] = newBlock;
                } else {
                    // 新規追加時は行を未定にしておき、assignRowsIfNeededで被らない行を自動割り当てする
                    projectState.blocks.push(newBlock);
                }

                assignRowsIfNeeded(); // rowを持たない新規ブロックにrowを割り当て
                modal.classList.remove('show');
                saveLocal();
                resizeCanvas(); // 追加で領域が広がる可能性考慮
            });

            document.getElementById('btn-reset').addEventListener('click', () => {
                if(confirm('プロジェクトをリセットします。よろしいですか？')) {
                    projectState.blocks = [];
                    saveLocal();
                    resizeCanvas();
                }
            });

            document.getElementById('btn-download').addEventListener('click', () => {
                // 解像度を2倍にして出力（いい感じの縮尺・高画質化）
                const tempCanvas = document.createElement('canvas');
                const scale = 2;
                tempCanvas.width = canvas.width * scale;
                tempCanvas.height = canvas.height * scale;
                const tCtx = tempCanvas.getContext('2d');
                
                // スケール適用
                tCtx.scale(scale, scale);

                // 背景を白で塗りつぶし
                tCtx.fillStyle = '#FFFFFF';
                tCtx.fillRect(0, 0, canvas.width, canvas.height);
                
                // 元のCanvas内容を描画
                tCtx.drawImage(canvas, 0, 0);
                
                // ロゴ表示用の透過背景ボックス
                tCtx.fillStyle = 'rgba(255, 255, 255, 0.85)';
                tCtx.fillRect(canvas.width - 250, canvas.height - 60, 250, 60);

                // アイコン画像の読み込みと描画
                const logoImg = new Image();
                logoImg.onload = () => {
                    const iconSize = 28;
                    const iconX = canvas.width - 230;
                    const iconY = canvas.height - 46;
                    
                    // アイコンを描画
                    tCtx.drawImage(logoImg, iconX, iconY, iconSize, iconSize);

                    // アプリ名（ロゴの右）
                    // tCtx.fillStyle = '#3B82F6'; // QcDaブルー
                    // tCtx.font = 'bold 24px Inter';
                    // tCtx.textAlign = 'left';
                    // tCtx.fillText('BloSke', iconX + iconSize + 10, canvas.height - 25);
                    
                    // コピーライト
                    tCtx.fillStyle = '#64748B'; // slate-500
                    tCtx.font = '12px Inter';
                    tCtx.textAlign = 'right';
                    tCtx.fillText('Created by QcDa Project', canvas.width - 20, canvas.height - 10);

                    // ダウンロード処理
                    const link = document.createElement('a');
                    link.download = `${projectState.projectName}.png`;
                    link.href = tempCanvas.toDataURL('image/png', 1.0);
                    link.click();
                };

                logoImg.onerror = () => {
                    // 画像の読み込みに失敗した場合のフォールバック（テキストのみ）
                    tCtx.fillStyle = '#3B82F6'; // QcDaブルー
                    tCtx.font = 'bold 24px Inter';
                    tCtx.textAlign = 'right';
                    tCtx.fillText('BloSke', canvas.width - 20, canvas.height - 30);
                    
                    tCtx.fillStyle = '#64748B'; // slate-500
                    tCtx.font = '12px Inter';
                    tCtx.textAlign = 'right';
                    tCtx.fillText('Created by QcDa Project', canvas.width - 20, canvas.height - 10);

                    const link = document.createElement('a');
                    link.download = `${projectState.projectName}.png`;
                    link.href = tempCanvas.toDataURL('image/png', 1.0);
                    link.click();
                };
                
                // 同じディレクトリにあるSVGアイコンを指定
                logoImg.src = 'icon.svg'; 
            });

            // Init resize
            setTimeout(resizeCanvas, 100);
        });
    </script>
</body>
</html>
